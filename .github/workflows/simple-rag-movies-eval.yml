name: "Simple RAG Movies - Agent Evaluation"

# Evaluates the simple-rag-movies Foundry agent using microsoft/ai-agent-evals.
# Docs: https://github.com/microsoft/ai-agent-evals
#
# Required GitHub repo configuration (Settings -> Secrets and variables -> Actions):
#   Variables:
#     AZURE_CLIENT_ID         - App registration / managed identity client ID (OIDC federated credential)
#     AZURE_TENANT_ID         - Entra ID tenant ID
#     AZURE_SUBSCRIPTION_ID   - Subscription containing the Foundry project
#     FOUNDRY_PROJECT_ENDPOINT- e.g. https://<account>.services.ai.azure.com/api/projects/<project>
#     EVAL_DEPLOYMENT_NAME    - Model deployment used to run evaluators (e.g. gpt-4.1 or gpt-5-mini)
#     EVAL_AGENT_IDS          - Agent id(s) in the form name:version (e.g. mongodb-search-agent:1).
#                               Comma-separate two ids to A/B compare (e.g. mongodb-search-agent:1,mongodb-search-agent:2)
#     EVAL_BASELINE_AGENT_ID  - (Optional) Baseline agent id for comparison (e.g. mongodb-search-agent:1).
#                               If empty, the first id in EVAL_AGENT_IDS is used as baseline.
#
# The identity referenced by AZURE_CLIENT_ID must have access to the Foundry project
# (Azure AI Developer / appropriate RBAC) and use an OIDC federated credential for azure/login.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "samples/simple-rag-movies/evals/**"
      - ".github/workflows/simple-rag-movies-eval.yml"

permissions:
  id-token: write
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC federated credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run Agent Evaluation
        uses: microsoft/ai-agent-evals@v3-beta
        with:
          azure-ai-project-endpoint: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          deployment-name: ${{ vars.EVAL_DEPLOYMENT_NAME }}
          agent-ids: ${{ vars.EVAL_AGENT_IDS }}
          baseline-agent-id: ${{ vars.EVAL_BASELINE_AGENT_ID }}
          data-path: ${{ github.workspace }}/samples/simple-rag-movies/evals/dataset.json
